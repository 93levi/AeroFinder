name: Keep backend warm

# Pings the Render API every 5 minutes so the free instance (and the
# Aiven DB it queries) never sleep — visitors avoid the cold-start delay.
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping the API (keeps Render + DB awake)
        run: |
          curl -sS --max-time 30 --retry 2 \
            "https://aerofinder-6kat.onrender.com/rentals/states" \
            && echo "" && echo "pinged ok"
